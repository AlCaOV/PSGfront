<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | Postogram</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <aside class="sidebar">
    </aside>
    <div class="main-content-wrapper">
        
        <header class="top-header">
            <img src="assets/img/logo-dark-transparent.png" class="header-logo-img">
        </header>

        <main class="hero-section">

            <div class="auth-card" id="loginCard">
                <div class="auth-banner">
                    <img src="assets/img/logo-dark-transparent.png" class="auth-logo">
                    <h2>Log in or register</h2>
                    <p class="join-text">Join us NOW!</p>
                </div>

                <div class="auth-form-wrapper">
                    <form id="loginForm">
                        <input type="text" id="username" placeholder="Your username or email" required>
                        <input type="password" id="password" placeholder="Password" required>
                        
                        <button type="submit" class="btn-primary">Login</button>
                        <button type="button" class="btn-secondary" id="showRegisterBtn">Create account</button>
                    </form>
                    <div class="form-footer-logo">PostOgram</div>
                </div>
            </div>
            
                
            <div class="register-card" id="registerCard" style="display: none;">
                
                
                <div class="register-main-side">
                    <h2 class="register-title">Create account</h2>
                    
                    <form id="registerForm">
                        <div class="register-inputs-grid">
                            <div class="reg-col">
                                <input type="text" id="regUsername" placeholder="Your username" required>
                                <input type="password" id="regPassword" placeholder="Password" required>
                                <input type="password" id="regConfirmPassword" placeholder="Confirm password" required>
                            </div>
                            <div class="reg-col">
                                <input type="text" id="regFullName" placeholder="Full name" required>
                                <input type="email" id="regEmail" placeholder="Email" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn-secondary reg-submit-btn">Create account</button>
                        <div class="form-footer-logo">PostOGram</div>
                        
                  
                        <button type="button" id="showLoginBtn" class="back-link">Back to login</button>
                    </form>
                </div>

          
                <div class="register-sidebar-side">
                    
            
                    <div class="avatar-upload-container">
                        <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('avatarInput').click()">
                            <span class="plus-icon">+</span>
                        </div>
                        <span class="avatar-label">Avatar</span>
                        <input type="file" id="avatarInput" accept="image/png, image/jpeg" style="display: none;">
                    </div>

                    <div class="bio-container">
                        <label class="bio-label">Tell about yourself</label>
                        <div class="textarea-wrapper">
                            <textarea id="regCaption" maxlength="2000"></textarea>
                            <span class="char-counter"><span id="charCount">0</span>/2000</span>
                        </div>
                    </div>

                </div>
            </div> 
        </main>

        <footer class="site-footer">
            <div class="footer-col">
                <img src="assets/img/logo-light-transparent.png" class="header-logo-img">
                <h3>Find us</h3>
                <p>Yurekserednij@gmail.com<br>Telegram: @AlCaOV<br>TikTok: @AlCaOV</p>
            </div>
            <div class="footer-col right-align">
                <h3>Need help?<br>contact us!</h3>
                <p>PostOGram@gmail.com<br>Telegram: @postogram<br>Viber: 0989063261</p>
                <p>0989063261<br>0975679873<br>0503017898</p>
            </div>
        </footer>

    </div>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
